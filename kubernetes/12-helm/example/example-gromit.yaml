apiVersion: apps/v1
kind: Deployment
metadata:
  name: gromit-is-best
  labels:
    app: gromit
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gromit
  template:
    metadata:
      labels:
        app: gromit
    spec:
      containers:
      - name: gromit-container
        image: nginx:1.25.3
        ports:
        - containerPort: 8080
